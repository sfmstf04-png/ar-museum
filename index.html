<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal AR Gallery</title>
    
    <!-- Libraries -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; background: #000; }
        .a-canvas { width: 100% !important; height: 100% !important; }
        .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .a-enter-vr { display: none !important; } /* Hide default AR button */
    </style>

    <script>
        // ============================================================
        // 1. CONFIGURATION: Make sure these match your GitHub files!
        // ============================================================
        const GALLERY_DATA = [
            { id: 1, title: "Art Piece 1", artist: "Me", file: "pic1.jpg" },
            { id: 2, title: "Art Piece 2", artist: "Me", file: "pic2.jpg" },
            { id: 3, title: "Art Piece 3", artist: "Me", file: "pic3.jpg" },
            { id: 4, title: "Art Piece 4", artist: "Me", file: "pic4.jpg" },
            { id: 5, title: "Art Piece 5", artist: "Me", file: "pic5.jpg" },
            { id: 6, title: "Art Piece 6", artist: "Me", file: "pic6.jpg" }
        ];

        // Register the click component
        AFRAME.registerComponent('gallery-item', {
            schema: { id: {type: 'number'} },
            init: function () {
                this.el.addEventListener('click', () => {
                    const item = GALLERY_DATA.find(d => d.id === this.data.id);
                    window.showInfoCard(item);
                });
            }
        });
    </script>
</head>
<body>

    <!-- A-Frame Scene -->
    <a-scene xr-mode-ui="enabled: true" renderer="colorManagement: true; antialias: true;">
        
        <a-assets id="gallery-assets">
            <!-- Assets will be injected here by JS -->
        </a-assets>

        <!-- Camera + Cursor -->
        <a-camera position="0 1.6 0">
            <a-cursor 
                color="#FFD700" 
                animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
                raycaster="objects: .clickable"
            ></a-cursor>
        </a-camera>

        <!-- The Gallery Group -->
        <a-entity id="gallery-container" position="0 0 -3"></a-entity>

        <!-- Lights -->
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="0 5 2" intensity="0.4"></a-light>
        
        <!-- Floor (Hidden in AR) -->
        <a-plane id="floor" rotation="-90 0 0" width="20" height="20" color="#111"></a-plane>
    </a-scene>

    <!-- UI Overlay -->
    <div class="fixed inset-0 pointer-events-none flex flex-col justify-between p-6 z-50">
        
        <!-- Top Nav -->
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="glass p-4 rounded-2xl">
                <h1 class="text-white text-xl font-bold tracking-tight">AR Gallery</h1>
                <p class="text-white/50 text-xs uppercase tracking-widest">Local Collection</p>
            </div>
            <button onclick="location.reload()" class="p-3 glass rounded-full text-white transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
            </button>
        </div>

        <!-- Info Card and Button -->
        <div class="flex flex-col items-center gap-6 pointer-events-auto">
            <div id="info-card" class="hidden glass p-6 rounded-3xl shadow-2xl max-w-xs w-full text-white relative">
                <button onclick="window.showInfoCard(null)" class="absolute top-4 right-4 text-white/40 hover:text-white">✕</button>
                <h3 id="card-title" class="text-2xl font-bold mb-1"></h3>
                <p id="card-artist" class="text-blue-400 font-medium mb-4"></p>
                <p class="text-sm text-white/70">Walk closer to the art or tap it to see more details.</p>
            </div>

            <button onclick="document.querySelector('a-scene').enterAR()" class="px-10 py-5 bg-white text-black rounded-full font-bold shadow-2xl flex items-center gap-3 hover:scale-105 active:scale-95 transition-all">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 12h10"/><path d="M12 7v10"/></svg>
                LAUNCH AR
            </button>
        </div>
    </div>

    <!-- Instructions Modal -->
    <div id="instructions" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-8 text-center">
        <div class="max-w-sm">
            <h2 class="text-white text-3xl font-bold mb-4">Welcome</h2>
            <p class="text-white/60 mb-8 leading-relaxed">Ensure your images are in the 'assets' folder. Open this on a mobile browser for the best experience.</p>
            <button onclick="document.getElementById('instructions').style.display='none'" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold uppercase tracking-widest">
                Explore Gallery
            </button>
        </div>
    </div>

    <script>
        function toggleInstructions(show) {
            document.getElementById('instructions').classList.toggle('hidden', !show);
        }

        window.showInfoCard = function(item) {
            const card = document.getElementById('info-card');
            if (!item) { card.classList.add('hidden'); return; }
            document.getElementById('card-title').innerText = item.title;
            document.getElementById('card-artist').innerText = `by ${item.artist}`;
            card.classList.remove('hidden');
        };

        const assets = document.getElementById('gallery-assets');
        const container = document.getElementById('gallery-container');

        // Initialize Items
        GALLERY_DATA.forEach((item, index) => {
            // 1. Create the Image Asset (to be loaded)
            const img = document.createElement('img');
            img.id = `img-${item.id}`;
            img.src = `assets/${item.file}`; 
            assets.appendChild(img);

            // 2. Position logic (Arc)
            const angle = (index - (GALLERY_DATA.length - 1) / 2) * 35;
            const radius = 3.5;
            const x = Math.sin(angle * (Math.PI / 180)) * radius;
            const z = (Math.cos(angle * (Math.PI / 180)) * radius) - radius;
            
            const entity = document.createElement('a-entity');
            entity.setAttribute('position', `${x} 1.6 ${z}`);
            entity.setAttribute('rotation', `0 ${-angle} 0`);

            // 3. Create the Frame & Canvas immediately (Bulletproof)
            const w = 1.2; 
            const h = 1.6;

            entity.innerHTML = `
                <!-- Frame Wood -->
                <a-box id="frame-bg-${item.id}" position="0 0 -0.05" width="${w + 0.1}" height="${h + 0.1}" depth="0.05" color="#2c1e12"></a-box>
                <!-- Gold Border -->
                <a-box id="frame-border-${item.id}" position="0 0 -0.03" width="${w + 0.04}" height="${h + 0.04}" depth="0.03" color="#D4AF37"></a-box>
                <!-- Image Canvas -->
                <a-image id="canvas-${item.id}" src="#img-${item.id}" width="${w}" height="${h}" class="clickable" gallery-item="id: ${item.id}"></a-image>
                <!-- Label -->
                <a-text value="${item.title}" position="0 ${-h/2 - 0.25} 0" align="center" width="2.5" color="#FFF"></a-text>
            `;

            container.appendChild(entity);

            // 4. Update the width based on real image ratio once it loads
            const checkImg = new Image();
            checkImg.src = `assets/${item.file}`;
            checkImg.onload = function() {
                const ratio = checkImg.naturalWidth / checkImg.naturalHeight;
                const finalW = h * ratio; // Adjust width to match image shape
                
                // Set the new widths
                document.getElementById(`canvas-${item.id}`).setAttribute('width', finalW);
                document.getElementById(`frame-bg-${item.id}`).setAttribute('width', finalW + 0.1);
                document.getElementById(`frame-border-${item.id}`).setAttribute('width', finalW + 0.04);
                console.log("Loaded: " + item.file);
            };
            checkImg.onerror = function() {
                console.error("COULD NOT FIND IMAGE: assets/" + item.file);
            };
        });

        // AR Visibility
        const scene = document.querySelector('a-scene');
        scene.addEventListener('enter-vr', () => {
            if (scene.is('ar-mode')) document.getElementById('floor').setAttribute('visible', 'false');
        });
        scene.addEventListener('exit-vr', () => {
            document.getElementById('floor').setAttribute('visible', 'true');
        });
    </script>
</body>
</html>
