<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AR Gallery</title>
    
    <!-- Libraries -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .a-canvas { width: 100% !important; height: 100% !important; }
        .a-enter-vr { display: none !important; }
        .glass { 
            background: rgba(15, 15, 15, 0.7); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script>
        /**
         * CONFIGURATION: UPDATE YOUR LOCAL IMAGES HERE
         * Ensure your images are in a folder named "assets"
         */
        const GALLERY_DATA = [
            { id: 1, title: "Deep Forest", artist: "Your Name", file: "1.jpg" },
            { id: 2, title: "Urban Sky", artist: "Your Name", file: "2.jpg" },
            { id: 3, title: "Neon Nights", artist: "Your Name", file: "3.jpg" },
            { id: 4, title: "Ocean Breeze", artist: "Your Name", file: "4.jpg" },
            { id: 5, title: "Mountain Peak", artist: "Your Name", file: "5.jpg" },
            { id: 6, title: "Digital Bloom", artist: "Your Name", file: "6.jpg" }
        ];

        AFRAME.registerComponent('gallery-item', {
            schema: { id: {type: 'number'} },
            init: function () {
                this.el.addEventListener('click', () => {
                    const item = GALLERY_DATA.find(d => d.id === this.data.id);
                    window.showInfoCard(item);
                });
            }
        });
    </script>
</head>
<body class="bg-black m-0 overflow-hidden">

    <!-- A-Frame Scene -->
    <a-scene xr-mode-ui="enabled: true" renderer="colorManagement: true; antialias: true;">
        
        <a-assets id="gallery-assets">
            <!-- Images are injected here via JS -->
        </a-assets>

        <a-camera position="0 1.6 0">
            <a-cursor 
                color="#FFD700" 
                animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
                raycaster="objects: .clickable"
            ></a-cursor>
        </a-camera>

        <!-- Curved Gallery Layout -->
        <a-entity id="gallery-container" position="0 0 -2.5"></a-entity>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 5 2" intensity="0.4"></a-light>
        
        <!-- Reference floor (hidden in AR) -->
        <a-plane id="floor" rotation="-90 0 0" width="30" height="30" color="#0a0a0a"></a-plane>
    </a-scene>

    <!-- UI Overlay -->
    <div class="fixed inset-0 pointer-events-none flex flex-col justify-between p-6 z-50">
        
        <!-- Top Nav -->
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="glass p-5 rounded-3xl">
                <h1 class="text-white text-lg font-bold">Virtual Exhibit</h1>
                <p class="text-white/50 text-xs uppercase tracking-widest">Spring 2024</p>
            </div>
            <button onclick="toggleInstructions(true)" class="w-12 h-12 glass rounded-full flex items-center justify-center text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            </button>
        </div>

        <!-- Detail Card & AR Button -->
        <div class="flex flex-col items-center gap-6 pointer-events-auto">
            
            <div id="info-card" class="hidden glass p-6 rounded-[2rem] max-w-xs w-full text-white animate-in">
                <div class="flex justify-between items-start mb-2">
                    <h3 id="card-title" class="text-2xl font-bold"></h3>
                    <button onclick="window.showInfoCard(null)" class="text-white/40 hover:text-white">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
                <p id="card-artist" class="text-blue-400 font-medium mb-4"></p>
                <p class="text-sm text-white/70 leading-relaxed">
                    Captured on local media and curated for this immersive AR environment.
                </p>
            </div>

            <button onclick="document.querySelector('a-scene').enterAR()" class="bg-white text-black px-10 py-5 rounded-full font-bold shadow-2xl hover:scale-105 transition-transform flex items-center gap-3">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 12h10"/><path d="M12 7v10"/></svg>
                LAUNCH AR
            </button>
        </div>
    </div>

    <!-- Instructions Modal -->
    <div id="instructions" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="max-w-sm w-full text-center text-white">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <h2 class="text-3xl font-bold mb-4">Ready to Explore?</h2>
            <p class="text-white/60 mb-10 leading-relaxed">Place the gallery in your room. Walk around the art and tap on frames to view details.</p>
            <button onclick="toggleInstructions(false)" class="w-full py-5 bg-blue-600 rounded-2xl font-bold hover:bg-blue-500 transition-colors">
                GET STARTED
            </button>
        </div>
    </div>

    <script>
        function toggleInstructions(show) {
            document.getElementById('instructions').classList.toggle('hidden', !show);
        }

        window.showInfoCard = function(item) {
            const card = document.getElementById('info-card');
            if (!item) { card.classList.add('hidden'); return; }
            document.getElementById('card-title').innerText = item.title;
            document.getElementById('card-artist').innerText = `by ${item.artist}`;
            card.classList.remove('hidden');
        };

        const assets = document.getElementById('gallery-assets');
        const container = document.getElementById('gallery-container');

        GALLERY_DATA.forEach((item, index) => {
            // 1. Load the local image into Assets
            const img = document.createElement('img');
            img.id = `img-${item.id}`;
            // Pointing to your local assets folder
            img.src = `./assets/${item.file}`; 
            assets.appendChild(img);

            // 2. Position logic (Arc shape)
            const angle = (index - (GALLERY_DATA.length - 1) / 2) * 30;
            const radius = 3.5;
            const x = Math.sin(angle * (Math.PI / 180)) * radius;
            const z = (Math.cos(angle * (Math.PI / 180)) * radius) - radius;
            
            const entity = document.createElement('a-entity');
            entity.setAttribute('position', `${x} 1.6 ${z}`);
            entity.setAttribute('rotation', `0 ${-angle} 0`);

            // 3. Dynamic Frame Sizing
            // We wait for image to load to get dimensions
            const tempImg = new Image();
            tempImg.src = `./assets/${item.file}`;
            tempImg.onload = () => {
                const ratio = tempImg.naturalWidth / tempImg.naturalHeight;
                const h = 1.5; 
                const w = h * ratio;

                entity.innerHTML = `
                    <!-- Frame Shadow/Backing -->
                    <a-box position="0 0 -0.06" width="${w + 0.15}" height="${h + 0.15}" depth="0.05" color="#111"></a-box>
                    <!-- Gold Border -->
                    <a-box position="0 0 -0.03" width="${w + 0.05}" height="${h + 0.05}" depth="0.03" color="#D4AF37"></a-box>
                    <!-- The Actual Image -->
                    <a-image src="#img-${item.id}" width="${w}" height="${h}" class="clickable" gallery-item="id: ${item.id}"></a-image>
                    <!-- Title Label -->
                    <a-text value="${item.title}" position="0 ${-h/2 - 0.25} 0" align="center" width="2.5" color="#FFF"></a-text>
                `;
            };

            container.appendChild(entity);
        });

        // AR Visual Fixes
        document.querySelector('a-scene').addEventListener('enter-vr', () => {
            document.getElementById('floor').setAttribute('visible', 'false');
        });
        document.querySelector('a-scene').addEventListener('exit-vr', () => {
            document.getElementById('floor').setAttribute('visible', 'true');
        });
    </script>
</body>
</html>
