<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <a-scene xr-mode-ui="enabled: true" renderer="colorManagement: true;">
      
      <a-assets>
        <img id="img1" src="1.jpg">
        <img id="img2" src="2.jpg">
        <img id="img3" src="3.jpg">
        <img id="img4" src="4.jpg">
        <img id="img5" src="5.jpg">
        <img id="img6" src="6.jpg">
      </a-assets>

      <a-camera position="0 1.6 0">
        <!-- Adding a cursor so the user can "click" in AR if needed -->
        <a-cursor fuse="false" raycaster="objects: .clickable" color="white"></a-cursor>
      </a-camera>

      <a-entity id="museum-arc" position="0 0 -2.5">
        
        <!-- FRAME TEMPLATE: We use a wrapper entity for each artwork -->
        
        <!-- Artwork 1 -->
        <a-entity position="-2.2 1.6 0.8" rotation="0 60 0">
          <a-plane color="#111" width="1.1" height="1.4" position="0 0 -0.01"></a-plane> <!-- The Frame -->
          <a-image src="#img1" width="1" height="1.3"></a-image> <!-- The Art -->
          <a-text value="Artwork Title 01" align="center" position="0 -0.8 0" width="2" color="white"></a-text> <!-- Label -->
        </a-entity>

        <!-- Artwork 2 -->
        <a-entity position="-1.3 1.6 0.2" rotation="0 35 0">
          <a-plane color="#111" width="1.1" height="1.4" position="0 0 -0.01"></a-plane>
          <a-image src="#img2" width="1" height="1.3"></a-image>
          <a-text value="Artwork Title 02" align="center" position="0 -0.8 0" width="2"></a-text>
        </a-entity>

        <!-- Artwork 3 -->
        <a-entity position="-0.45 1.6 -0.1" rotation="0 10 0">
          <a-plane color="#111" width="1.1" height="1.4" position="0 0 -0.01"></a-plane>
          <a-image src="#img3" width="1" height="1.3"></a-image>
          <a-text value="Artwork Title 03" align="center" position="0 -0.8 0" width="2"></a-text>
        </a-entity>

        <!-- Artwork 4 -->
        <a-entity position="0.45 1.6 -0.1" rotation="0 -10 0">
          <a-plane color="#111" width="1.1" height="1.4" position="0 0 -0.01"></a-plane>
          <a-image src="#img4" width="1" height="1.3"></a-image>
          <a-text value="Artwork Title 04" align="center" position="0 -0.8 0" width="2"></a-text>
        </a-entity>

        <!-- Artwork 5 -->
        <a-entity position="1.3 1.6 0.2" rotation="0 -35 0">
          <a-plane color="#111" width="1.1" height="1.4" position="0 0 -0.01"></a-plane>
          <a-image src="#img5" width="1" height="1.3"></a-image>
          <a-text value="Artwork Title 05" align="center" position="0 -0.8 0" width="2"></a-text>
        </a-entity>

        <!-- Artwork 6 -->
        <a-entity position="2.2 1.6 0.8" rotation="0 -60 0">
          <a-plane color="#111" width="1.1" height="1.4" position="0 0 -0.01"></a-plane>
          <a-image src="#img6" width="1" height="1.3"></a-image>
          <a-text value="Artwork Title 06" align="center" position="0 -0.8 0" width="2"></a-text>
        </a-entity>

      </a-entity>

      <!-- LIGHTING IMPROVEMENT -->
      <a-light type="ambient" intensity="0.6"></a-light>
      <!-- Point light makes the frames look like they have a highlight -->
      <a-light type="point" position="0 2 -1" intensity="0.8" distance="5"></a-light>

    </a-scene>

    <!-- UI -->
    <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999;">
        <button onclick="document.querySelector('a-scene').enterAR()" style="padding: 15px 25px; border-radius: 30px; border: none; background: #222; color: white; font-size: 18px; font-weight: bold; cursor: pointer; border: 2px solid #fff;">
            START EXPERIENCE
        </button>
    </div>
  </body>
</html>
