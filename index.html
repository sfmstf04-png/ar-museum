<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <a-scene xr-mode-ui="enabled: true" renderer="colorManagement: true;">
      
      <a-assets>
        <img id="img1" src="1.jpg">
        <img id="img2" src="2.jpg">
        <img id="img3" src="3.jpg">
        <img id="img4" src="4.jpg">
        <img id="img5" src="5.jpg">
        <img id="img6" src="6.jpg">
      </a-assets>

      <a-camera position="0 1.6 0"></a-camera>

      <!-- 
        THE LAYOUT: 
        All images are 1 meter wide. 
        X positions are exactly 1.05 meters apart (1m width + 0.05m gap).
      -->
      <a-entity id="gallery-arc" position="0 0 -3">
        
        <!-- Left Side -->
        <a-image src="#img1" position="-2.62 1.6 0.5" rotation="0 35 0" width="1" height="1.3"></a-image>
        <a-image src="#img2" position="-1.57 1.6 0.15" rotation="0 20 0" width="1" height="1.3"></a-image>
        <a-image src="#img3" position="-0.52 1.6 0.0" rotation="0 5 0" width="1" height="1.3"></a-image>

        <!-- Right Side -->
        <a-image src="#img4" position="0.52 1.6 0.0" rotation="0 -5 0" width="1" height="1.3"></a-image>
        <a-image src="#img5" position="1.57 1.6 0.15" rotation="0 -20 0" width="1" height="1.3"></a-image>
        <a-image src="#img6" position="2.62 1.6 0.5" rotation="0 -35 0" width="1" height="1.3"></a-image>

      </a-entity>

      <!-- Soft Museum Lighting -->
      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" position="0 5 2" intensity="0.5"></a-light>

    </a-scene>

    <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999;">
        <button onclick="document.querySelector('a-scene').enterAR()" style="padding: 15px 25px; border-radius: 30px; border: none; background: #007bff; color: white; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
            ENTER AR MUSEUM
        </button>
    </div>
  </body>
</html>
